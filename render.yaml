services:
  - type: web
    name: makro-precios
    env: python
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./knasta.db
      - key: PYTHONUNBUFFERED
        value: "1"
